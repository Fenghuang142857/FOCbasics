<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | CS Learning Hub</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --accent: #10b981;
            --accent-gradient: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --nav-height: 70px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGATION --- */
        nav {
            height: var(--nav-height);
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo-link {
            text-decoration: none;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .back-btn {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        /* --- CONTENT --- */
        main {
            flex: 1;
            padding: 120px 5% 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at 50% 0%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
        }

        .form-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .form-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .form-header p {
            color: var(--text-secondary);
        }

        .feedback-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-gradient);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            filter: brightness(1.1);
        }

        /* --- FOOTER --- */
        footer {
            background: #020617;
            padding: 3rem 5%;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .team-text {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        @media (max-width: 600px) {
            .feedback-card {
                padding: 1.5rem;
            }
            .form-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<!-- 1. Include the Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 2. Initialize Supabase
        // Replace these with your actual Project URL and Anon Key from Project Settings > API
        const SUPABASE_URL = 'https://gkrsgblobiciqolqpnuf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_AEkpQPab3BSiYOj8job2GA_einygs7M';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 3. Handle Form Submission
        const feedbackForm = document.querySelector('form');
        const submitBtn = document.querySelector('.submit-btn');

        feedbackForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Change button state
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Sending... <i class="fas fa-spinner fa-spin"></i>';

            // Get form data
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                topic: document.getElementById('topic').value,
                message: document.getElementById('message').value
            };

            try {
                // 4. Insert data into Supabase
                const { data, error } = await supabase
                    .from('feedback')
                    .insert([formData]);

                if (error) throw error;

                // Success!
                alert('Feedback sent successfully! Thank you.');
                feedbackForm.reset();

            } catch (error) {
                console.error('Error:', error.message);
                alert('Something went wrong. Please try again.');
            } finally {
                // Restore button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Submit Feedback <i class="fas fa-paper-plane"></i>';
            }
        });
    </script>
<body>

    <nav>
        <a href="index.html" class="logo-link"><div class="logo">CS HUB</div></a>
        <div class="nav-right">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
        </div>
    </nav>

    <main>
        <div class="form-header">
            <h1>Send us <span style="color: var(--accent);">Feedback</span></h1>
            <p>Help us improve the Learning Hub for everyone.</p>
        </div>

        <div class="feedback-card">
            <form action="#">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@college.com" required>
                </div>

                <div class="form-group">
                    <label for="topic">Subject</label>
                    <input type="text" id="topic" placeholder="e.g. Note Suggestion, Bug Report">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Tell us what's on your mind..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    Submit Feedback <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </main>

    <footer>
        <p class="team-text">The S2 AIML Team</p>
        <p style="color: var(--text-secondary); font-size: 0.85rem; opacity: 0.6;">Your feedback matters to us.</p>
    </footer>

</body>
</html>
